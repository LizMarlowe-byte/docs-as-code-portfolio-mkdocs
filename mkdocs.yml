site_name: Doc Site Using MkDocs
site_description: Docs-as-code portfolio demonstrating MkDocs, IA, and CI/CD skills.
site_url: https://lizmarlowe-byte.github.io/docs-as-code-portfolio-mkdocs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.prune
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      title: "Table of Contents"   # <-- add this line
      permalink: true
      toc_depth: 2
  - tables
  - fenced_code
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 🌐 Doc Site Using MkDocs:
      - About this Site: index.md

  - 📘 User Guides:
      - user-guides/index.md
      - Docmost User Guide: user-guides/Docmost-User-Guide.md
      - Taiga User Guide: user-guides/Taiga-User-Guide.md

  - 🧩 API Guides:
      - api-guides/index.md
      - OpenWeatherMap API Guide: api-guides/OpenWeatherMap-API-Guide.md
      - Spotify API Guide: api-guides/Spotify-API-Guide.md

  - 🛠️ How-To Articles:
      - how-to-articles/index.md
      - How to create a relationship table in MadCap Flare: how-to-articles/How-to-create-a-relationship-table-in-MadCap-Flare.md

  - 📚 Technical Reference Guides:
      - technical-reference-guides/index.md
      - Optiflow CloudSync CRM Integration Guide: technical-reference-guides/Optiflow_CloudSync_CRM_Integration_Guide.md
      - AuroraOps Platform 5.2.0 Release Notes: technical-reference-guides/AuroraOps-Platform-5.2.0-Release-Notes.md

strict: true
